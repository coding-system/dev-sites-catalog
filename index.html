<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Document</title>
      <link rel="stylesheet" href="./styles/index.css" />
      <link
         rel="stylesheet"
         href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
      />
      <link
         rel="stylesheet"
         href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      />
   </head>
   <body class="body">
      <div class="resolution">
         <label for="filter" class="switch" aria-label="Toggle Filter">
            <input type="checkbox" id="filter" />
            <span>FHD</span>
            <span>2K</span>
         </label>
      </div>
      <div class="portfolio">
         <div class="portfolio__screen">
            <div class="portfolio__bar">
               <div class="portfolio__buttons">
                  <div class="portfolio__buttons-circles">
                     <div
                        class="portfolio__buttons-circles-item portfolio__buttons-circles-red"
                     ></div>
                     <div
                        class="portfolio__buttons-circles-item portfolio__buttons-circles-yellow"
                     ></div>
                     <div
                        class="portfolio__buttons-circles-item portfolio__buttons-circles-green"
                     ></div>
                  </div>
                  <div class="portfolio__buttons-arrows">
                     <button
                        class="portfolio__buttons-arrows-item portfolio__buttons-arrows-prev"
                     >
                        <span class="fa-solid fa-chevron-left"></span>
                     </button>
                     <button
                        class="portfolio__buttons-arrows-item portfolio__buttons-arrows-next"
                     >
                        <span class="fa-solid fa-chevron-right"></span>
                     </button>
                  </div>
               </div>
               <div class="portfolio__data">
                  <span class="portfolio__data-link"
                     >https://icons.getbootstrap.com/</span
                  >
                  <span class="portfolio__data-title"
                     >Bootstrap Icons · Official open source SVG icon library
                     for Bootstrap
                  </span>
                  <button
                     class="portfolio__data-refresh"
                     title="Обновить страницу"
                  >
                     <span class="fa-sharp fa-solid fa-rotate-right"></span>
                  </button>
               </div>
            </div>
            <div class="portfolio__preview">
               <iframe
                  class="portfolio__preview-content"
                  src="https://www.deepseek.com/"
                  frameborder="0"
               ></iframe>
            </div>
         </div>
      </div>
      <script type="module" src="./index.js"></script>
   </body>
</html>
